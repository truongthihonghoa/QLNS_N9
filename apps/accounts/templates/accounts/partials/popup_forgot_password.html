{% load static %}
<!-- Forgot Password Popup -->
<div class="popup-overlay" id="forgot-password-popup">
    <div class="background-shadow-popup">
        <div class="x" id="close-forgot-password-btn">
            <img class="vector" src="{% static 'accounts/img/close_icon.png' %}" alt="Close" />
        </div>
        <div class="container-popup">
            <div class="symbol-popup">
                <img src="{% static 'accounts/img/key_icon.png' %}" alt="Key Icon">
            </div>
        </div>
        <div class="heading-popup"><div class="text-wrapper-popup">Đặt lại mật khẩu</div></div>
        <div class="vui-l-ng-nh-p-m-t-kh-wrapper">
            <p class="vui-l-ng-nh-p-m-t-kh">Vui lòng nhập thông tin để<br />hoàn tất quá trình khôi phục tài khoản</p>
        </div>

        <!-- Username Field -->
        <div class="div-popup">
            <div class="label-popup"><div class="text-wrapper-2-popup">Tên đăng nhập</div></div>
            <div class="input-popup">
                <input type="text" name="reset_username" required style="width: 100%; height: 100%; border: none; background: transparent; padding: 0 10px; font-size: 14px;">
            </div>
        </div>

        <!-- New Password Field -->
        <div class="div-popup">
            <div class="label-popup"><div class="text-wrapper-2-popup">Mật khẩu mới</div></div>
            <div class="input-popup">
                <input type="password" name="new_password" required style="width: 100%; height: 100%; border: none; background: transparent; padding: 0 10px; font-size: 14px;">
            </div>
        </div>

        <!-- Confirm New Password Field -->
        <div class="container-2-popup">
            <div class="label-popup"><p class="text-wrapper-2-popup">Nhập lại mật khẩu mới</p></div>
            <div class="input-popup">
                <input type="password" name="confirm_new_password" required style="width: 100%; height: 100%; border: none; background: transparent; padding: 0 10px; font-size: 14px;">
            </div>
        </div>

        <div class="button-group">
            <div class="hy-popup" id="cancel-forgot-password-btn"><span class="text-wrapper-3-popup">Hủy</span></div>
            <div class="luu-mat-khau-popup" id="save-password-btn"><span class="text-wrapper-4-popup">Lưu Mật Khẩu</span></div>
        </div>
        <div class="div-wrapper-popup"><p class="p-popup">Mật khẩu phải có ít nhất 8 ký tự bao gồm chữ và số.</p></div>
    </div>
</div>
