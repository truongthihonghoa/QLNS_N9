{% load static %}
<!-- Change Password Popup -->
<div class="popup-overlay" id="change-password-popup">
    <div class="background-shadow-popup">
        <div class="x" id="close-change-password-btn">
            <img class="vector" src="{% static 'accounts/img/close_icon.png' %}" alt="Close" />
        </div>
        <div class="container-popup">
            <div class="symbol-popup">
                <img src="{% static 'accounts/img/key_icon.png' %}" alt="Key Icon">
            </div>
        </div>
        <div class="heading-popup"><div class="text-wrapper-popup">Đổi mật khẩu</div></div>

        <!-- Error Message Container -->
        <div id="change-password-error" class="error-message" style="display: none;"></div>

        <!-- Username Field -->
        <div class="div-popup">
            <div class="label-popup"><div class="text-wrapper-2-popup">Tên đăng nhập</div></div>
            <div class="input-popup">
                <input type="text" id="change-username" name="username" required style="width: 100%; height: 100%; border: none; background: transparent; padding: 0 10px; font-size: 14px;">
            </div>
        </div>

        <!-- Old Password Field -->
        <div class="div-popup">
            <div class="label-popup"><div class="text-wrapper-2-popup">Mật khẩu hiện tại</div></div>
            <div class="input-popup password-input-group">
                <input type="password" id="old-password" name="old_password" required style="width: 100%; height: 100%; border: none; background: transparent; padding: 0 40px 0 10px; font-size: 14px;">
                <i class="toggle-password" data-target="old-password">
                    <img src="{% static 'accounts/img/eye_opened.png' %}" alt="Toggle" class="eye-icon-img">
                </i>
            </div>
        </div>

        <!-- New Password Field -->
        <div class="div-popup">
            <div class="label-popup"><div class="text-wrapper-2-popup">Mật khẩu mới</div></div>
            <div class="input-popup password-input-group">
                <input type="password" id="new-password" name="new_password" required style="width: 100%; height: 100%; border: none; background: transparent; padding: 0 40px 0 10px; font-size: 14px;">
                <i class="toggle-password" data-target="new-password">
                    <img src="{% static 'accounts/img/eye_opened.png' %}" alt="Toggle" class="eye-icon-img">
                </i>
            </div>
        </div>

        <!-- Confirm New Password Field -->
        <div class="container-2-popup">
            <div class="label-popup"><p class="text-wrapper-2-popup">Nhập lại mật khẩu mới</p></div>
            <div class="input-popup password-input-group">
                <input type="password" id="confirm-password" name="confirm_password" required style="width: 100%; height: 100%; border: none; background: transparent; padding: 0 40px 0 10px; font-size: 14px;">
                <i class="toggle-password" data-target="confirm-password">
                    <img src="{% static 'accounts/img/eye_opened.png' %}" alt="Toggle" class="eye-icon-img">
                </i>
            </div>
        </div>

        <div class="button-group">
            <div class="hy-popup" id="cancel-change-password-btn"><span class="text-wrapper-3-popup">Hủy</span></div>
            <div class="luu-mat-khau-popup" id="save-change-password-btn"><span class="text-wrapper-4-popup">Lưu Mật Khẩu</span></div>
        </div>
        <div class="div-wrapper-popup"><p class="p-popup">Mật khẩu phải có ít nhất 8 ký tự bao gồm chữ và số.</p></div>
    </div>
</div>
