{% load static %}
<div class="confirm-delete-popup-overlay" id="confirm-delete-popup">
    <div class="confirm-delete-popup-box">
        <img class="error-icon" src="{% static 'images/confirm_icon.png' %}" alt="Confirm">
        <div class="heading">{{ delete_popup_title|default:'XÁC NHẬN XÓA' }}</div>
        <p class="message-line1">{{ delete_popup_message_1|default:'Bạn có chắc chắn muốn xóa mục này?' }}</p>
        {% if delete_popup_message_2_before or delete_popup_highlight %}
        <p class="message-line2">{{ delete_popup_message_2_before }} <span class="highlight">{{ delete_popup_highlight }}</span></p>
        {% endif %}
        <button class="no-btn" id="delete-popup-no-btn">Không</button>
        <button class="yes-btn" id="delete-popup-yes-btn">Đồng ý</button>
    </div>
</div>
